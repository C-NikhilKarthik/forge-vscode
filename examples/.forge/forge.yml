# Forge project config. Lives at .forge/forge.yml in your repo.
# Machine lifecycle is managed in the Vast.ai browser UI, not here.

env:
  file: .forge/environment.yml   # repo-relative path to the micromamba/conda env
  name: project                  # env name to create on the box

# Datasets / checkpoints to fetch on the remote. Downloaded once; cached to a
# mounted /data volume if present, else to ~/.forge-cache. Re-runs skip these.
data:
  - { src: "hf://openai/gsm8k", dest: "/data/datasets/gsm8k" }
  # - { src: "s3://my-bucket/models/llama.pt", dest: "/data/checkpoints/llama.pt" }
  # - { src: "https://example.com/weights.bin", dest: "/data/checkpoints/weights.bin" }

# Shell commands run (inside the env) after the env + data are ready.
setup:
  - pip install -e .

# Optional default command — surfaced for you to run, not executed automatically.
run:
  - python train.py
