# Conda environment spec, in TOML. Forge translates this into a standard
# environment.yml on the box (conda only reads YAML) and runs `conda env create`.

name = "project"
channels = ["conda-forge"]
dependencies = ["python=3.11", "pip"]

# pip deps become the nested `- pip:` list in the generated environment.yml.
pip = ["huggingface_hub"]   # needed for hf:// data sources
